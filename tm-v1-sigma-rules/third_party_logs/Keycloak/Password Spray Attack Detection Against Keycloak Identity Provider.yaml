title: Password Spray Attack Against Keycloak Identity Provider
description: |-
  Detects password spray attacks targeting Keycloak Identity and Access Management platform. This filter identifies multiple authentication failure events originating from the same source IP address but targeting different usernames, which is characteristic of password spraying (MITRE ATT&CK T1110.003).
references: []
tags: []
logsource:
  category: THIRD_PARTY_LOG
  product: Keycloak
  definition: THIRDPARTY_THIRDPARTY
detection:
  selection_failure:
    actResult: '*failed*'
  selection_event:
    eventSubName:
    - '*LOGIN_ERROR*'
    - '*LOGIN_FAILURE*'
    - '*LOGIN_FAILED*'
    - '*login_error*'
    - '*login_failure*'
    - '*authentication_failure*'
  condition: selection_failure or selection_event
level: info
taxonomy: tm-v1
