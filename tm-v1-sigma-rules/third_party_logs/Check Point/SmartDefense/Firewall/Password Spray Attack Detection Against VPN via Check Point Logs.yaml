title: Password Spray Attack Against VPN via Check Point Logs
description: |-
  Detects password spray attacks targeting VPN infrastructure monitored by Check Point firewalls. Password spraying (MITRE ATT&CK T1110.003) is a brute force variant where an attacker attempts a small number of commonly used passwords against many different user accounts from a single source IP, deliberately staying below per-account lockout thresholds.
references: []
tags: []
logsource:
  category: THIRD_PARTY_LOG
  product: Check Point
  definition: THIRDPARTY_THIRDPARTY
detection:
  selection_action:
    act:
    - '*deny*'
    - '*Deny*'
    - '*Drop*'
    - '*drop*'
    - '*failed*'
    - '*Failed*'
    - '*reject*'
    - '*Reject*'
  selection_vpn:
    eventSubName:
    - '*VPN*'
    - '*vpn*'
    - '*IKE*'
    - '*Remote Access*'
  selection_has_user:
    logonUser: '*'
  selection_has_src:
    src: '*'
  condition: selection_action and selection_vpn and selection_has_user and selection_has_src
level: info
taxonomy: tm-v1
