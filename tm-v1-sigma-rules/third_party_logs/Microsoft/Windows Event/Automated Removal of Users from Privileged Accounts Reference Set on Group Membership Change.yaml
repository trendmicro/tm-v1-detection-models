title: Privileged Group Member Removal Detection - Windows Security Events
description: |-
  Detects when a member is removed from a security-enabled group (global, local, or universal) in Active Directory. This corresponds to Windows Event IDs 4729 (member removed from security-enabled global group), 4733 (member removed from security-enabled local group), and 4764 (security-enabled universal group was deleted).
